name: 🚀 Feature Request
description: Propose a new visual enhancement, animation sequence, or local-first capability.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an enhancement to FocusFlow!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear description of the enhancement, motion graphic transitions, or local storage extensions.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative implementations or patterns you've analyzed.
    validations:
      required: false
